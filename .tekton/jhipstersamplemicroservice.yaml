# Managed by jenkins-2026 (scripts/06-tekton-pipelines.sh). Tekton Pipelines-as-Code
# runs this on push/PR to main; it references the in-cluster microservices-pipeline.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: jhipstersamplemicroservice
  # Backstage's Kubernetes-backend fetch rides app.kubernetes.io/name (docs/505,
  # same contract as tekton/runs/*.yaml + the TriggerTemplate): PaC preserves
  # authored labels and only adds its own pipelinesascode.tekton.dev/* set.
  labels:
    jenkins2026.io/service: jhipstersamplemicroservice
    jenkins2026.io/env: stable
    app.kubernetes.io/name: jhipstersamplemicroservice
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push, pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    jenkins2026.io/url-microservices: "https://microservices.jenkins2026.nubenetes.com"
    jenkins2026.io/url-tekton-dashboard: "https://tekton.jenkins2026.nubenetes.com"
    jenkins2026.io/url-argocd: "https://argocd.jenkins2026.nubenetes.com"
    jenkins2026.io/url-headlamp: "https://headlamp.jenkins2026.nubenetes.com"
    jenkins2026.io/url-pgadmin: "https://pgadmin.jenkins2026.nubenetes.com"
spec:
  taskRunTemplate:
    serviceAccountName: tekton-ci
  # Resolve the in-cluster Pipeline via the cluster resolver. A bare
  # 'pipelineRef: {name: ...}' makes Pipelines-as-Code try to fetch the Pipeline
  # from the git repo (it's not in .tekton/) and fail with "cannot find referenced
  # pipeline". The cluster resolver defers resolution to Tekton at runtime, reading
  # microservices-pipeline (and its Tasks) from the tekton-ci namespace.
  pipelineRef:
    resolver: cluster
    params:
      - {name: kind, value: pipeline}
      - {name: name, value: microservices-pipeline}
      - {name: namespace, value: tekton-ci}
  params:
    - {name: service-name, value: "jhipstersamplemicroservice"}
    - {name: service-type, value: "java"}
    - {name: git-repo-url, value: "https://github.com/nubenetes/jhipster-sample-app-microservice.git"}
    - {name: git-branch, value: "{{ source_branch }}"}
    - {name: module-path, value: ""}
    - {name: target-namespace, value: "microservices"}
    - {name: env-name, value: "stable"}
    - {name: port, value: "8081"}
    - {name: health-path, value: "/management/health"}
    - {name: image, value: "ghcr.io/nubenetes/jenkins-2026-microservices/jhipstersamplemicroservice:{{ revision }}"}
    - {name: registry-host, value: "ghcr.io"}
    - {name: self-repo-url, value: "https://github.com/nubenetes/jenkins-2026.git"}
    - {name: self-repo-branch, value: "develop"}
    - {name: otlp-endpoint, value: "http://otel-collector-gateway.observability.svc.cluster.local:4317"}
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources: {requests: {storage: 4Gi}}
    - name: dockerconfig
      secret:
        secretName: tekton-registry
        items: [{key: .dockerconfigjson, path: config.json}]
